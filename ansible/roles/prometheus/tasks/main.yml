- name: Create prometheus user
  user:
    name: "{{ prometheus.user }}"
    shell: /usr/sbin/nologin
    system: yes

- name: Create directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ prometheus.user }}"
    group: "{{ prometheus.user }}"
    mode: "0755"
  loop:
    - "{{ prometheus.dir }}"
    - "{{ prometheus.data_dir }}"

- name: Download Prometheus
  get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus.version }}/prometheus-{{ prometheus.version }}.linux-amd64.tar.gz"
    dest: "/tmp/prometheus.tar.gz"

- name: Extract Prometheus
  unarchive:
    src: "/tmp/prometheus.tar.gz"
    dest: "/tmp"
    remote_src: yes

- name: Copy binaries
  copy:
    src: "/tmp/prometheus-{{ prometheus.version }}.linux-amd64/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    mode: "0755"
    remote_src: yes
  loop:
    - prometheus
    - promtool

- name: Create config file
  template:
    src: prometheus.yml.j2
    dest: "{{ prometheus.dir }}/prometheus.yml"
    owner: "{{ prometheus.user }}"
    group: "{{ prometheus.user }}"
    mode: "0644"
  notify:
    - reload prometheus

- name: Create systemd unit file
  ansible.builtin.template:
    src: "{{ prometheus.service_name }}.service.j2"
    dest: "/etc/systemd/system/{{ prometheus.service_name }}.service"
    owner: root
    group: root
    mode: '0644'
  register: systemd_file
  notify:
    - restart prometheus
  
- name: Force immediate daemon-reload
  ansible.builtin.systemd:
    daemon_reload: yes
  when: systemd_file.changed

- name: Ensure the service is started and enabled on boot
  ansible.builtin.systemd_service:
    name: "{{ prometheus.service_name }}"
    state: started
    enabled: true