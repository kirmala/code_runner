code_runner_path: "/opt/code_runner"

code_runner_http_tag: "latest"
code_runner_consumer_tag: "latest"
code_runner_sandbox_tag: "latest"
code_runner_migrations_tag: "latest"


code_runner:
  service_name: "code_runner"
  description: "Docker Compose code runner app"
  user: "code_runner"
  repo_path: "{{ code_runner_path }}"
  external_port: "8080"
  http_server_metrics_port: "{{ code_runner_http_server_metrics_port | default(2112) }}"
  
  limits:
    burst: 5
    interval_sec: 100s
    restart_sec: 10s

  commands:
    start: "docker compose -f compose.yml up"
    stop: "docker compose -f compose.yml down"

  images:
    http_server: 
      name: "kirill252/code_runner-http_server"
      tag: "{{ code_runner_http_tag }}"
    consumer: 
      name: "kirill252/code_runner-consumer"
      tag: "{{ code_runner_consumer_tag }}"
    sandbox: 
      name: "kirill252/code_runner-sandbox"
      tag: "{{ code_runner_sandbox_tag }}"
    migrations: 
      name: "kirill252/code_runner-migrations"
      tag: "{{ code_runner_migrations_tag }}"

  files:
    env: "{{ code_runner_path }}/.env"
    compose: "{{ code_runner_path }}/compose.yml"
  
  postgres:
    user: "{{ postgresql_user | default('admin') }}"
    database: "{{ postgresql_database | default('code_runner') }}"
    host: "{{ postgresql_host | default('host.docker.internal') }}"
    port: "{{ postgresql_port | default(5432) }}"

  redis:
    addresses: "{{ redis_cluster_1_name | default('redis-node-1')}}:6379,{{ redis_cluster_2_name | default('redis-node-2')}}:6379,{{ redis_cluster_3_name | default('redis-node-3')}}:6379,{{ redis_cluster_4_name | default('redis-node-4')}}:6379,{{ redis_cluster_5_name | default('redis-node-5')}}:6379,{{ redis_cluster_6_name | default('redis-node-6')}}:6379"

  network: "{{ docker_network_name | default('code_runner_network')}}"