name: Security Scanning

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  # ───────────────────────────────────────────────────────────
  # 1. SAST — semgrep (custom rules) + gosec
  # ───────────────────────────────────────────────────────────
  sast:
    name: SAST (semgrep + gosec)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      # ── semgrep ──────────────────────────────────────────
      - name: Install semgrep
        run: pip install semgrep

      - name: semgrep — custom security rules
        run: |
          mkdir -p security/reports
          semgrep \
            --config security/semgrep-rules.yaml \
            --metrics=off \
            --json \
            --output security/reports/semgrep-report.json \
            http_server/ consumer/
        # exit 1 when findings exist — we capture it and always upload
        continue-on-error: true

      - name: semgrep — print summary
        run: |
          python3 - <<'EOF'
          import json
          with open("security/reports/semgrep-report.json") as f:
              data = json.load(f)
          results = data.get("results", [])
          print(f"\n{'='*60}")
          print(f"semgrep findings: {len(results)}")
          print(f"{'='*60}")
          for r in results:
              sev = r["extra"]["severity"]
              rule = r["check_id"].split(".")[-1]
              path = r["path"]
              line = r["start"]["line"]
              msg  = r["extra"]["message"].split(".")[0].strip()
              print(f"  [{sev}] {rule}")
              print(f"    {path}:{line}")
              print(f"    {msg}")
              print()
          EOF

      # ── gosec ────────────────────────────────────────────
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: gosec — http_server
        working-directory: http_server
        run: |
          go mod download
          $(go env GOPATH)/bin/gosec \
            -conf ../security/gosec-config.json \
            -fmt json \
            -out ../security/reports/gosec-http_server.json \
            ./...
        continue-on-error: true

      - name: gosec — consumer
        working-directory: consumer
        run: |
          go mod download
          $(go env GOPATH)/bin/gosec \
            -conf ../security/gosec-config.json \
            -fmt json \
            -out ../security/reports/gosec-consumer.json \
            ./...
        continue-on-error: true

      - name: gosec — print summary
        run: |
          python3 - <<'EOF'
          import json, glob
          for path in glob.glob("security/reports/gosec-*.json"):
              with open(path) as f:
                  data = json.load(f)
              issues = data.get("Issues") or []
              stats  = data.get("Stats", {})
              print(f"\n{'='*60}")
              print(f"gosec: {path}  |  files={stats.get('files',0)}  issues={len(issues)}")
              print(f"{'='*60}")
              for i in issues:
                  print(f"  [{i['severity']}] {i['rule_id']} — {i['details']}")
                  print(f"    {i['file']}:{i['line']}")
              if not issues:
                  print("  No issues found.")
          EOF

      - name: Upload SAST reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-reports
          path: security/reports/
          retention-days: 30

  # ───────────────────────────────────────────────────────────
  # 2. DAST — OWASP ZAP (API scan via swagger.yaml)
  # ───────────────────────────────────────────────────────────
  dast:
    name: DAST (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: sast

    steps:
      - uses: actions/checkout@v4

      - name: Create .env from template
        run: envsubst < .env.example > .env
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}

      - name: Create docker network
        run: |
          docker network inspect code_runner_network >/dev/null 2>&1 \
            || docker network create code_runner_network

      - name: Start Redis cluster
        run: docker compose -f redis_cluster/compose.yml --env-file .env up -d

      - name: Build and start application stack
        run: |
          docker compose build http_server
          docker compose up -d postgres broker http_server

      - name: Wait for http_server to become healthy
        run: |
          echo "Waiting for http_server..."
          timeout 120 bash -c '
            until [ "$(docker inspect -f "{{.State.Health.Status}}" \
              $(docker compose ps -q http_server))" = "healthy" ]; do
              echo "  still waiting..."
              sleep 5
            done
          '
          echo "http_server is healthy"

      - name: ZAP — OpenAPI scan
        run: |
          mkdir -p zap-reports
          docker run --rm \
            --network code_runner_network \
            -v ${{ github.workspace }}/zap-reports:/zap/reports:rw \
            -v ${{ github.workspace }}/http_server/docs:/zap/docs:ro \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-api-scan.py \
              -t "http://http_server:8080/swagger/doc.json" \
              -f openapi \
              -r /zap/reports/zap-report.html \
              -J /zap/reports/zap-report.json \
              -z "-config rules.cookie.ignorelist=sessionid" \
              -I
        continue-on-error: true

      - name: ZAP — print alert summary
        run: |
          python3 - <<'EOF'
          import json, os
          path = "zap-reports/zap-report.json"
          if not os.path.exists(path):
              print("ZAP report not found")
              raise SystemExit(0)
          with open(path) as f:
              data = json.load(f)
          alerts = data.get("site", [{}])[0].get("alerts", [])
          print(f"\n{'='*60}")
          print(f"ZAP alerts: {len(alerts)}")
          print(f"{'='*60}")
          for a in sorted(alerts, key=lambda x: x.get("riskcode","0"), reverse=True):
              print(f"  [risk={a['riskdesc']}] {a['alert']}")
              print(f"    {a.get('desc','')[:120].strip()}")
              print()
          EOF
        continue-on-error: true

      - name: Upload ZAP reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dast-zap-reports
          path: zap-reports/
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v
          docker compose -f redis_cluster/compose.yml --env-file .env down -v

  # ───────────────────────────────────────────────────────────
  # 3. SCA — Trivy (go.mod dependency scan)
  # ───────────────────────────────────────────────────────────
  sca:
    name: SCA (Trivy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Trivy — scan http_server (table)
        uses: aquasecurity/trivy-action@0.31.0
        with:
          scan-type: fs
          scan-ref: ./http_server
          scanners: vuln
          format: table
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '0'

      - name: Trivy — scan consumer (table)
        uses: aquasecurity/trivy-action@0.31.0
        with:
          scan-type: fs
          scan-ref: ./consumer
          scanners: vuln
          format: table
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '0'

      - name: Trivy — SARIF for GitHub Security tab (http_server)
        uses: aquasecurity/trivy-action@0.31.0
        with:
          scan-type: fs
          scan-ref: ./http_server
          scanners: vuln
          format: sarif
          output: trivy-http_server.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '0'

      - name: Trivy — SARIF for GitHub Security tab (consumer)
        uses: aquasecurity/trivy-action@0.31.0
        with:
          scan-type: fs
          scan-ref: ./consumer
          scanners: vuln
          format: sarif
          output: trivy-consumer.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '0'

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: '.'
          category: trivy-sca

      - name: Upload SCA artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sca-reports
          path: |
            trivy-http_server.sarif
            trivy-consumer.sarif
          retention-days: 30
