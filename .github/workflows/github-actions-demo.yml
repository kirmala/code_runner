name: CI/CD Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]


jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      # Expose filter results as job outputs
      http_server: ${{ steps.filter.outputs.http_server }}
      consumer: ${{ steps.filter.outputs.consumer }}
      sandbox: ${{ steps.filter.outputs.sandbox }}
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            http_server: ['http_server/**']
            consumer: ['consumer/**']
            sandbox: ['consumer/service/docker/**']
            migrations: ['http_server/repository/postgres/**']

  build:
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: http_server
            context: .
            file: ./http_server/Dockerfile
            tag: code_runner-http_server
          - service: consumer
            context: .
            file: ./consumer/Dockerfile
            tag: code_runner-consumer
          - service: sandbox
            context: .
            file: ./consumer/service/docker/Dockerfile
            tag: code_runner-sandbox
          - service: migrations
            context: ./http_server/repository/postgres
            file: ./http_server/repository/postgres/Dockerfile
            tag: code_runner-migrations
    
    steps:
      - name: Checkout code
        # We only need to checkout if this specific service changed
        if: needs.changes.outputs[matrix.service] == 'true'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: needs.changes.outputs[matrix.service] == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: needs.changes.outputs[matrix.service] == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        # Move the IF check here!
        if: needs.changes.outputs[matrix.service] == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.tag }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}



  integration_tests:
    runs-on: ubuntu-latest

    needs: [changes, build]
    if: always() && needs.changes.result == 'success' && (needs.build.result == 'success' || needs.build.result == 'skipped')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Make
        run: sudo apt-get install make

      - name: Create .env file from template
        run: envsubst < .env.example > .env
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
      
      - name: Run tests
        run: |
          mkdir -p integration_logs
          make test-up | tee integration_logs/app_test.log
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs
          path: integration_logs/
          
      - name: Cleanup
        if: always()
        run: make test-down

  deploy:
    runs-on: self-hosted
    needs: integration_tests
    if: github.ref == 'refs/heads/main' && needs.integration_tests.result == 'success'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python and Install dependencies
      run: |
        python3 -m venv ~/runner-venv
        source ~/runner-venv/bin/activate
        pip install --upgrade pip
        pip install ansible docker
        ansible-galaxy collection install community.docker

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh

        printf "%s" "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519

        printf "%s" "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

    - name: Add vault
      run: |
        mkdir -p ~/secrets
        echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > ~/secrets/ansible_vault_pass 

    - name: Run ansible playbook
      env:
        ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
      run: |
        source ~/runner-venv/bin/activate
        ansible-playbook -i ansible/inventory.ini ansible/site.yml \
          --vault-password-file=<(printf "%s" "$ANSIBLE_VAULT_PASSWORD")
