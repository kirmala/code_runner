basePath: /
definitions:
  dto.GetTaskStatusHandlerResponse:
    properties:
      status:
        type: string
    type: object
  dto.PostUserLoginHandlerRequest:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  dto.PostUserLoginHandlerResponse:
    properties:
      token:
        type: string
    type: object
  dto.PostUserRegisterHandlerRequest:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  httpx.HTTPError:
    properties:
      error:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: This is a code runner.
  title: code_processor/http_server
  version: "1.0"
paths:
  /task/result/{id}:
    get:
      consumes:
      - application/json
      description: Get a task result by its id
      parameters:
      - description: Id of the task
        in: path
        name: id
        required: true
        type: string
      - description: Bearer token for authentication
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: task
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/httpx.HTTPError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.HTTPError'
        "404":
          description: Task not found
          schema:
            $ref: '#/definitions/httpx.HTTPError'
      summary: Get a task result
      tags:
      - task
  /task/status/{id}:
    get:
      consumes:
      - application/json
      description: Get a task status by its id
      parameters:
      - description: Id of the task
        in: path
        name: id
        required: true
        type: string
      - description: Bearer token for authentication
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.GetTaskStatusHandlerResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/httpx.HTTPError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.HTTPError'
        "404":
          description: Task not found
          schema:
            $ref: '#/definitions/httpx.HTTPError'
      summary: Get a task status
      tags:
      - task
  /user/login:
    post:
      consumes:
      - application/json
      description: Logins new user and creates new session for him
      parameters:
      - description: user login and password
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/dto.PostUserLoginHandlerRequest'
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PostUserLoginHandlerResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/httpx.HTTPError'
        "404":
          description: Not found
          schema:
            $ref: '#/definitions/httpx.HTTPError'
      summary: Login a user
      tags:
      - user
  /user/register:
    post:
      consumes:
      - application/json
      description: Registers new user and adds them to data base
      parameters:
      - description: user login and password
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/dto.PostUserRegisterHandlerRequest'
      responses:
        "201":
          description: Created
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/httpx.HTTPError'
        "409":
          description: Key already exists
          schema:
            $ref: '#/definitions/httpx.HTTPError'
      summary: Register a user
      tags:
      - user
swagger: "2.0"
