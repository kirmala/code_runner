services:
  http_server:
    build:
      context: .
      dockerfile: http_server/Dockerfile
    environment:
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - REDIS_PASSWORD
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s 
      timeout: 10s   
      retries: 3     
      start_period: 10s
    depends_on:
      broker: 
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  
  broker:
    image: "rabbitmq:3-management"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 30s
      retries: 3

  consumer:
    build:
      context: .
      dockerfile: consumer/Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
    depends_on:
      broker: 
        condition: service_healthy
      postgres:
        condition: service_healthy


  postgres:
    build:
      context: http_server/repository/postgres
      dockerfile: Dockerfile
    container_name: my_postgres_db
    environment:
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d code_runner"]
      interval: 1s
      timeout: 5s
      retries: 10
  

  redis:
    image: redis:7.2-alpine
    container_name: redis
    volumes:
      - redis_data:/data
    environment:
      - REDIS_PASSWORD
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "$$REDIS_PASSWORD", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  
volumes:
  postgres_data:
  redis_data:


